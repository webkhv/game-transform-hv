<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-site-title>Loading...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#6C5CE7;--accent:#FF6B6B;--bg:#0F0F1A;--card:#1A1A2E;--text:#EDEDEF;--muted:#9B9BA7;--grad1:linear-gradient(135deg,#6C5CE7,#A29BFE,#74B9FF);--grad2:linear-gradient(135deg,#FF6B6B,#FFA502)}
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
        .bg-orbs{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-orbs .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.15;animation:orbFloat 20s ease-in-out infinite}
        .bg-orbs .orb:nth-child(1){width:600px;height:600px;background:#6C5CE7;top:-200px;left:-100px}
        .bg-orbs .orb:nth-child(2){width:400px;height:400px;background:#FF6B6B;bottom:10%;right:-100px;animation-delay:-7s}
        .bg-orbs .orb:nth-child(3){width:300px;height:300px;background:#74B9FF;top:50%;left:50%;animation-delay:-14s}
        @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(60px,-40px) scale(1.1)}66%{transform:translate(-30px,50px) scale(.95)}}
        .navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(15,15,26,.7);border-bottom:1px solid rgba(108,92,231,.1);transition:padding .3s}
        .navbar.scrolled{padding:.7rem 2rem;background:rgba(15,15,26,.95)}
        .nav-logo{font-weight:800;font-size:1.4rem;background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .nav-links{display:flex;gap:2rem;list-style:none}
        .nav-links a{color:var(--muted);text-decoration:none;font-weight:500;font-size:.9rem;transition:color .3s}
        .nav-links a:hover{color:#fff}
        .nav-cta{background:var(--grad1);color:#fff;border:none;padding:.6rem 1.5rem;border-radius:50px;font-weight:600;font-size:.9rem;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .3s}
        .nav-cta:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(108,92,231,.4)}
        .hero{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:8rem 2rem 4rem;background-size:cover;background-position:center;background-repeat:no-repeat}
        .hero::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,15,26,.85) 0%,rgba(15,15,26,.7) 50%,rgba(15,15,26,.95) 100%);z-index:0}
        .hero>*{position:relative;z-index:1}
        .hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:150px;background:linear-gradient(transparent,var(--bg));z-index:1;pointer-events:none}
        .hero-content{max-width:800px}
        .hero-badge{display:inline-block;background:rgba(108,92,231,.15);border:1px solid rgba(108,92,231,.3);color:#A29BFE;padding:.4rem 1.2rem;border-radius:50px;font-size:.85rem;font-weight:500;margin-bottom:1.5rem;animation:fadeUp .8s .2s both}
        .hero h1{font-size:clamp(2.5rem,6vw,4.5rem);font-weight:900;line-height:1.1;margin-bottom:1.5rem;animation:fadeUp .8s .4s both}
        .hero h1 .hl{background:var(--grad1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .hero>p{font-size:clamp(1rem,2vw,1.25rem);color:var(--muted);max-width:600px;margin:0 auto 2.5rem;animation:fadeUp .8s .6s both}
        .hero-buttons{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;animation:fadeUp .8s .8s both}
        .btn{border:none;padding:1rem 2.5rem;border-radius:50px;font-weight:700;font-size:1.05rem;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .3s}
        .btn:hover{transform:translateY(-2px) scale(1.03)}
        .btn-primary{background:var(--grad1);color:#fff}
        .btn-primary:hover{box-shadow:0 8px 30px rgba(108,92,231,.4)}
        .btn-outline{background:0 0;color:#fff;border:2px solid rgba(255,255,255,.15)}
        .btn-outline:hover{border-color:var(--primary);background:rgba(108,92,231,.1)}
        .hero-stats{display:flex;gap:3rem;justify-content:center;margin-top:4rem;flex-wrap:wrap;animation:fadeUp .8s 1s both}
        .stat{text-align:center}
        .stat-num{font-size:2rem;font-weight:800;background:var(--grad2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stat-lbl{font-size:.85rem;color:var(--muted);margin-top:.3rem}
        @keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        section{position:relative;z-index:1;padding:6rem 2rem}
        .container{max-width:1100px;margin:0 auto}
        .sec-label{text-transform:uppercase;font-size:.8rem;letter-spacing:3px;color:var(--accent);font-weight:600;margin-bottom:.7rem}
        .sec-title{font-size:clamp(2rem,4vw,3rem);font-weight:800;margin-bottom:1rem}
        .sec-sub{color:var(--muted);font-size:1.1rem;max-width:600px;margin-bottom:3rem}
        .tc{text-align:center}.tc>.sec-sub{margin-inline:auto}
        .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
        .about-text p{color:var(--muted);font-size:1.05rem;margin-bottom:1.5rem}
        .feat{list-style:none}
        .feat li{display:flex;gap:.8rem;margin-bottom:1rem;font-size:.95rem}
        .feat .ico{flex-shrink:0;width:24px;height:24px;background:var(--grad1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;margin-top:2px}
        .about-img-wrap{border-radius:20px;overflow:hidden;border:1px solid rgba(108,92,231,.15);position:relative}
        .about-img{width:100%;display:block;object-fit:cover;max-height:400px}
        .about-caption{position:absolute;bottom:0;left:0;right:0;padding:1.2rem;background:linear-gradient(transparent,rgba(15,15,26,.9));color:#fff;font-size:.85rem;font-style:italic;line-height:1.5}
        .benefits-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
        .b-card{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:2rem;transition:all .4s;position:relative;overflow:hidden}
        .b-card::before{content:'';position:absolute;inset:0;border-radius:20px;padding:2px;background:var(--grad1);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:0;transition:opacity .4s}
        .b-card:hover::before{opacity:1}
        .b-card:hover{transform:translateY(-5px);background:rgba(26,26,46,.8)}
        .b-icon{font-size:2.5rem;margin-bottom:1rem}
        .b-card h3{font-size:1.2rem;font-weight:700;margin-bottom:.7rem}
        .b-card p{color:var(--muted);font-size:.9rem}
        .games-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
        .g-card{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:20px;overflow:hidden;transition:transform .4s}
        .g-card:hover{transform:translateY(-5px)}
        .g-img{height:220px;font-size:4rem;background-size:cover;background-position:center;position:relative;display:block}
        .g-img .g-emoji{position:absolute;bottom:12px;right:16px;font-size:2.5rem;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
        .g-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--card))}
        .g-body{padding:1.5rem}
        .g-tag{display:inline-block;background:rgba(108,92,231,.15);color:#A29BFE;padding:.2rem .8rem;border-radius:50px;font-size:.75rem;font-weight:600;margin-bottom:.7rem}
        .g-card h3{font-weight:700;font-size:1.15rem;margin-bottom:.5rem}
        .g-card p{color:var(--muted);font-size:.9rem}
        .g-meta{display:flex;gap:1rem;margin-top:1rem;font-size:.8rem;color:var(--muted)}
        .g-meta span{display:flex;align-items:center;gap:.3rem}
        .process-steps{display:flex;gap:2rem;position:relative;justify-content:center;flex-wrap:wrap}
        .step{text-align:center;flex:1;min-width:200px;max-width:250px;position:relative}
        .step-num{width:50px;height:50px;border-radius:50%;background:var(--grad1);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;margin:0 auto 1rem;position:relative;z-index:1}
        .step h4{font-weight:700;margin-bottom:.5rem}
        .step p{color:var(--muted);font-size:.9rem}
        .step-arrow{position:absolute;right:-1.5rem;top:25px;color:var(--muted);font-size:1.5rem;display:none}
        @media(min-width:768px){.step-arrow{display:block}}
        .reviews-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem}
        .r-card{background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:20px;padding:2rem;transition:transform .3s}
        .r-card:hover{transform:translateY(-3px)}
        .r-stars{color:#FFA502;font-size:1.1rem;margin-bottom:1rem;letter-spacing:2px}
        .r-text{font-style:italic;font-size:.95rem;margin-bottom:1.5rem;line-height:1.7;color:var(--muted)}
        .r-author{display:flex;align-items:center;gap:1rem}
        .r-avatar{width:45px;height:45px;border-radius:50%;background:var(--grad1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.1rem;color:#fff}
        .r-name{font-weight:600;font-size:.95rem}
        .r-role{font-size:.8rem;color:var(--muted)}
        .cta-box{background:var(--card);border:1px solid rgba(108,92,231,.2);border-radius:30px;padding:4rem 3rem;text-align:center;position:relative;overflow:hidden}
        .cta-box::before{content:'';position:absolute;inset:-2px;border-radius:32px;background:var(--grad1);z-index:-1;opacity:.3;filter:blur(20px)}
        .cta-box h2{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:800;margin-bottom:1rem}
        .cta-box p{color:var(--muted);font-size:1.1rem;max-width:500px;margin:0 auto 2rem}
        .cta-btn{display:inline-block;background:var(--grad1);color:#fff;border:none;padding:1.2rem 3rem;border-radius:50px;font-weight:700;font-size:1.1rem;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .3s}
        .cta-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(108,92,231,.4)}
        .footer{position:relative;z-index:1;padding:3rem 2rem;text-align:center;border-top:1px solid rgba(255,255,255,.05)}
        .footer p{color:var(--muted);font-size:.9rem}
        .footer a{color:var(--primary);text-decoration:none}
        @media(max-width:768px){.nav-links{display:none}.about-grid{grid-template-columns:1fr}.hero-stats{gap:1.5rem}.process-steps{flex-direction:column;align-items:center}}
        .reveal{opacity:0;transform:translateY(40px);transition:all .7s cubic-bezier(.22,.61,.36,1)}
        .reveal.visible{opacity:1;transform:translateY(0)}
    </style>
</head>
<body>
    <div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
    <nav class="navbar" id="navbar"></nav>
    <header class="hero" id="hero"></header>
    <section id="about"></section>
    <section id="benefits" class="tc"></section>
    <section id="games"></section>
    <section id="process" class="tc"></section>
    <section id="reviews"></section>
    <section id="contact" class="tc"></section>
    <footer class="footer" id="footer"></footer>

    <script>
    let D = null;
    async function load(){
        try {
            const r = await fetch('data.json?t='+Date.now());
            D = await r.json();
        } catch(e) {
            console.error('Failed to load data.json', e);
            document.body.innerHTML = '<div style="padding:4rem;text-align:center"><h1>Ошибка загрузки data.json</h1></div>';
            return;
        }
        render(); initReveal(); initNav();
    }
    function render(){
        const s = D.site;
        document.title = s.title;
        document.querySelector('.hero').style.backgroundImage = `url('${s.imgHero}')`;
        document.getElementById('navbar').innerHTML =
            `<div class="nav-logo">${s.navLogo}</div>`+
            `<ul class="nav-links">${s.navLinks.map(l=>`<li><a href="${l.href}"${l.isCta?' class="nav-cta"':''}>${l.text}</a></li>`).join('')}</ul>`;
        document.getElementById('hero').innerHTML =
            `<div class="hero-content">`+
            `<div class="hero-badge">${s.badge}</div>`+
            `<h1>${s.heroTitle}</h1>`+
            `<p>${s.heroSubtitle}</p>`+
            `<div class="hero-buttons"><a href="${s.navLinks.find(l=>l.isCta).href}" class="btn btn-primary">${s.btnPrimary}</a><a href="#about" class="btn btn-outline">${s.btnOutline}</a></div>`+
            `<div class="hero-stats">${s.stats.map(st=>`<div class="stat"><div class="stat-num">${st.num}</div><div class="stat-lbl">${st.label}</div></div>`).join('')}</div>`+
            `</div>`;
        const a = D.about;
        document.getElementById('about').innerHTML =
            `<div class="container"><div class="about-grid">`+
            `<div class="about-text reveal"><div class="sec-label">${a.label}</div><h2 class="sec-title">${a.title}</h2><p>${a.text}</p>`+
            `<ul class="feat">${a.features.map(f=>`<li><span class="ico">✓</span><span>${f}</span></li>`).join('')}</ul></div>`+
            `<div class="about-img-wrap reveal"><img src="${a.imgAbout}" alt="${a.title}" class="about-img"><div class="about-caption">${a.aboutCaption}</div></div>`+
            `</div></div>`;
        const b = D.benefits;
        document.getElementById('benefits').innerHTML =
            `<div class="container">`+
            `<div class="sec-label reveal">${b.label}</div><h2 class="sec-title reveal">${b.title}</h2><p class="sec-sub reveal">${b.subtitle}</p>`+
            `<div class="benefits-grid">${b.items.map(i=>`<div class="b-card reveal"><div class="b-icon">${i.icon}</div><h3>${i.title}</h3><p>${i.text}</p></div>`).join('')}</div>`+
            `</div>`;
        const g = D.games;
        document.getElementById('games').innerHTML =
            `<div class="container">`+
            `<div class="sec-label reveal">${g.label}</div><h2 class="sec-title reveal">${g.title}</h2><p class="sec-sub reveal">${g.subtitle}</p>`+
            `<div class="games-grid">${g.items.map(i=>`<div class="g-card reveal"><div class="g-img" style="background-image:url('${i.bgImg}');background-color:${i.bg.includes('#')?i.bg.split(',')[0].replace('linear-gradient(135deg,',''):i.bg}"><span class="g-emoji">${i.emoji}</span></div><div class="g-body"><span class="g-tag">${i.tag}</span><h3>${i.name}</h3><p>${i.text}</p><div class="g-meta">${i.meta.map(m=>`<span>${m}</span>`).join('')}</div></div></div>`).join('')}</div>`+
            `</div>`;
        const p = D.process;
        document.getElementById('process').innerHTML =
            `<div class="container">`+
            `<div class="sec-label reveal">${p.label}</div><h2 class="sec-title reveal">${p.title}</h2><p class="sec-sub reveal">${p.subtitle}</p>`+
            `<div class="process-steps reveal">${p.items.map((i,idx,arr)=>`<div class="step"><div class="step-num">${i.num}</div><h4>${i.title}</h4><p>${i.text}</p>${idx<arr.length-1?'<span class="step-arrow">→</span>':''}</div>`).join('')}</div>`+
            `</div>`;
        const rv = D.reviews;
        document.getElementById('reviews').innerHTML =
            `<div class="container">`+
            `<div class="sec-label reveal">${rv.label}</div><h2 class="sec-title reveal">${rv.title}</h2><p class="sec-sub reveal">${rv.subtitle}</p>`+
            `<div class="reviews-grid">${rv.items.map(i=>`<div class="r-card reveal"><div class="r-stars">${i.stars}</div><div class="r-text">${i.text}</div><div class="r-author"><div class="r-avatar">${i.avatar}</div><div><div class="r-name">${i.name}</div><div class="r-role">${i.role}</div></div></div></div>`).join('')}</div>`+
            `</div>`;
        const c = D.cta;
        document.getElementById('contact').innerHTML =
            `<div class="container"><div class="cta-box reveal">`+
            `<h2>${c.title}</h2><p>${c.text}</p>`+
            `<a href="${c.btnUrl}" class="cta-btn">${c.btnText}</a>`+
            `<p style="margin-top:1.5rem;font-size:.9rem">или позвоните: <strong style="color:#fff">${c.phone}</strong></p>`+
            `</div></div>`;
        document.getElementById('footer').innerHTML = `<p>${D.footer}</p>`;
    }
    function initReveal(){document.querySelectorAll('.reveal').forEach(el=>{const chk=()=>{if(el.getBoundingClientRect().top<window.innerHeight-80)el.classList.add('visible')};window.addEventListener('scroll',chk);chk()})}
    function initNav(){window.addEventListener('scroll',()=>document.querySelector('.navbar').classList.toggle('scrolled',window.scrollY>50));document.querySelectorAll('a[href^="#"]').forEach(a=>{a.addEventListener('click',e=>{e.preventDefault();const t=document.querySelector(a.getAttribute('href'));if(t)t.scrollIntoView({behavior:'smooth',block:'start'})})})}
    // Preview mode - intercept fetch for data.json
    (function(){
        if(location.search.includes('preview=1')){
            var pd = localStorage.getItem('preview_data');
            if(pd){
                var origFetch = window.fetch;
                window.fetch = function(url){
                    if(url && (url.includes('data.json'))) return Promise.resolve(new Response(pd));
                    return origFetch.apply(this, arguments);
                };
            }
        }
    })();
    window.addEventListener('load',load);
    </script>
</body>
</html>
